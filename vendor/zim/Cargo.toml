# Vendored copy of the `zim` crate (https://github.com/dignifiedquire/zim),
# v0.4.0, Apache-2.0/MIT (see LICENSE-APACHE / LICENSE-MIT). The upstream crate
# is unmaintained and panics/overflows opening modern (libzim 6.1+) ZIM files —
# its `parse_article_list` treats the now-sentinel `titlePtrPos` as a real offset
# (`start + count*4` overflows). SearchBox only iterates by URL, never by title,
# so src/zim.rs is patched to make the title-list parse tolerant (return empty on
# overflow / out-of-bounds) instead of failing. Pulled in via `[patch.crates-io]`
# in the workspace root Cargo.toml.
#
# This vendored copy also drops the upstream CLI `[[bin]]`s and their heavy deps
# (clap, rayon, indicatif, pbr, num-format, num_cpus, stopwatch, hex) — only the
# library is kept.
[package]
name = "zim"
version = "0.4.0"
edition = "2021"
description = "ZIM reading and extraction (vendored + patched for SearchBox)"
license = "Apache-2.0/MIT"
repository = "https://github.com/dignifiedquire/zim"

[dependencies]
bitreader = "0.3"
byteorder = "1.2"
md-5 = "0.10"
memmap = "0.7"
ouroboros = "0.15"
thiserror = "1.0"
xz2 = "0.1"
zstd = "0.12"
