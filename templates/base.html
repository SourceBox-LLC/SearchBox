<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{% block title %}SearchBox{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}?v=2">
  {% block head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      fetch('/api/auth/status')
        .then(response => response.json())
        .then(data => {
          const path = window.location.pathname;
          
          if (data.setup_required) {
            if (!path.startsWith('/setup')) {
              window.location.href = '/setup';
            }
          } else if (!data.authenticated) {
            if (path !== '/' && path !== '/login' && path !== '/landing' && !path.startsWith('/setup')) {
              window.location.href = '/login';
            }
          }
        })
        .catch(err => {
          console.error('Failed to check auth status:', err);
          const path = window.location.pathname;
          if (path !== '/' && path !== '/login' && path !== '/landing' && !path.startsWith('/setup')) {
            window.location.href = '/login';
          }
        });

      const logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', function() {
          const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content;
          fetch('/logout', {
            method: 'POST',
            headers: { 'X-CSRFToken': csrfToken || '' }
          })
            .then(() => { window.location.href = '/login'; })
            .catch(err => console.error('Logout failed:', err));
        });
      }
    });
  </script>

  <script src="{{ url_for('static', filename='js/base.js') }}?v=2"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
