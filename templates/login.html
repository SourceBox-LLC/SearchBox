{% extends "base.html" %}

{% block title %}Login - SearchBox{% endblock %}

{% block head %}
<style>
.login-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 40px;
  max-width: 400px;
  width: 100%;
}

.login-header {
  text-align: center;
  margin-bottom: 32px;
}

.login-logo {
  width: 48px;
  height: 48px;
  margin-bottom: 16px;
}

.login-title {
  font-size: 24px;
  font-weight: 600;
  color: #f0f6fc;
  margin: 0 0 8px 0;
}

.login-subtitle {
  font-size: 14px;
  color: #8b949e;
  margin: 0;
}

.login-form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-label {
  font-size: 14px;
  font-weight: 500;
  color: #c9d1d9;
}

.form-input {
  padding: 12px 16px;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 8px;
  color: #f0f6fc;
  font-size: 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-input:focus {
  outline: none;
  border-color: #58a6ff;
  box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
}

.form-input::placeholder {
  color: #484f58;
}

.form-checkbox {
  display: flex;
  align-items: center;
  gap: 8px;
}

.form-checkbox input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: #58a6ff;
}

.form-checkbox label {
  font-size: 14px;
  color: #8b949e;
  cursor: pointer;
}

.error-message {
  color: #f85149;
  font-size: 13px;
  text-align: center;
  padding: 12px;
  background: rgba(248, 81, 73, 0.1);
  border-radius: 8px;
  margin-bottom: 8px;
}

.submit-btn {
  padding: 12px 24px;
  background: #238636;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 8px;
}

.submit-btn:hover {
  background: #2ea043;
}

.submit-btn:disabled {
  background: #21262d;
  color: #484f58;
  cursor: not-allowed;
}
</style>
{% endblock %}

{% block body %}
<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <svg class="login-logo" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to your SearchBox instance</p>
    </div>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    <form class="login-form" method="POST" action="/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      
      {% if next %}
      <input type="hidden" name="next" value="{{ next }}">
      {% endif %}
      
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-input" 
          placeholder="Enter your email"
          value="{{ email or '' }}"
          required
          autocomplete="email"
          autofocus
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="form-input" 
          placeholder="Enter your password"
          required
          autocomplete="current-password"
        >
      </div>

      <div class="form-checkbox">
        <input type="checkbox" id="remember" name="remember" checked>
        <label for="remember">Stay logged in (30 days)</label>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">
        Sign In
      </button>
    </form>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const form = document.querySelector('.login-form');
  const submitBtn = document.getElementById('submit-btn');
  
  form.addEventListener('submit', function() {
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in...';
  });
});
</script>
{% endblock %}
